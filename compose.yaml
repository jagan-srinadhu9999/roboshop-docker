services:
  mongodb:
    image: jaganf8/mongodb:2.0.0
    container_name: mongodb
    ports:
      - "27017:27017" 
    volumes:
      - mongo_data:/data/db
    networks:
      - roboshop

  redis:
    image: jaganf8/redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - roboshop

  mysql:
    image: jaganf8/mysql:2.0.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=roboshop@1
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - roboshop

  rabbitmq:
    image: jaganf8/rabbitmq:3
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - roboshop


  catalogue:
    image: jaganf8/catalogue:2.0.0
    container_name: catalogue
    environment:
      - MONGO=true
      - MONGO_URL=mongodb://mongodb:27017/catalogue
    ports:
      - "8080:8080"
    networks:
      - roboshop
    depends_on:
      - mongodb
  
  user:
    image: jaganf8/user:2.0.0
    container_name: user
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017/users
    networks:
      - roboshop

    depends_on:
      - redis
      - mongodb
    # ports:
    #   - "8080:8080"
  

  cart:
    image: jaganf8/cart:2.0.0
    container_name: cart
    environment:
      - REDIS_HOST=redis
      - CATALOGUE_HOST=catalogue
      - CATALOGUE_PORT=8080
    networks:
      - roboshop
    depends_on:
      - redis
      - catalogue
    # ports:
    #   - "8080:8080"

  shipping:
    image: jaganf8/shipping:2.0.0
    container_name: shipping
    environment:
      - CART_ENDPOINT=cart:8080
      - DB_HOST=mysql
    networks:
      - roboshop
    depends_on:
      - cart 
      - mysql
    # ports:
    #   - "8080:8080"
  
  payment:
    image: jaganf8/payment:2.0.0
    container_name: payment
    environment:
      - CART_HOST=cart
      - CART_PORT=8080
      - USER_HOST=user
      - USER_PORT=8080
      - AMQP_HOST=rabbitmq
      - AMQP_USER=roboshop
      - AMQP_PASS=roboshop123
    networks:
      - roboshop
    depends_on:
      - cart
      - user
      - rabbitmq
    # ports:
    #   - "8080:8080"

  dispatch:
    image: jaganf8/dispatch:2.0.0
    container_name: dispatch
    environment:
      - AMQP_HOST=rabbitmq
      - AMQP_USER=roboshop
      - AMQP_PASS=roboshop123
    networks:
      - roboshop
    depends_on:
      - rabbitmq
    # ports:
    #   - "8080:8080"
  
  frontend:
    image: jaganf8/frontend:2.0.0
    container_name: frontend
    networks:
      - roboshop
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment
      - dispatch

  
volumes:
  mongo_data:
  redis_data:
  mysql_data:
  rabbitmq_data:

networks:
  roboshop:
    driver: bridge